<!--
  Bento Layout Example
  ====================
  Hand this file to your agent instead of describing what you want in prose.
  Concrete examples produce better adapted results than prose descriptions.

  Key design decisions:
  - CSS Grid with intentionally asymmetric cells (not a uniform card grid)
  - No borders, border-radius, or box-shadow on cells (these are card signals)
  - Visual separation comes from gap on the grid container only
  - Background colors applied directly to grid cells
  - Dark palette to break from default Bootstrap/light-card patterns

  See: pre-commitment-template.md for why examples work better than descriptions.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard: Bento Layout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif;
      background: #1a1e2e;
      color: #e0e4f0;
      min-height: 100vh;
      padding: 2rem;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .cell { padding: 1.5rem; }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a90a8;
      margin-bottom: 0.5rem;
    }

    .big-number { font-size: 3rem; font-weight: 700; line-height: 1.1; }
    .body-text  { font-size: 1rem; line-height: 1.5; color: #c0c4d4; }
    .accent     { color: #5bb8d4; }

    /* Cell colors and grid spans */
    .cell-revenue    { background: #243447; grid-column: span 2; }
    .cell-projects   { background: #1e3a3a; }
    .cell-timeline   { background: #2a2d40; grid-row: span 2; }
    .cell-team       { background: #1e3a3a; }
    .cell-completion { background: #243447; }
    .cell-status     { background: #2e2440; grid-column: span 3; }

    /* Timeline */
    .timeline-item { padding: 0.75rem 0; border-bottom: 1px solid #3a3d52; }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-date { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #5bb8d4; margin-bottom: 0.25rem; }
    .timeline-desc { font-size: 0.9rem; color: #c0c4d4; }

    /* Status bar */
    .status-row { display: flex; gap: 2rem; align-items: center; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
    .status-dot.green  { background: #4ade80; }
    .status-dot.yellow { background: #facc15; }
    .status-dot.blue   { background: #5bb8d4; }

    /* Responsive: collapse to single column */
    @media (max-width: 640px) {
      .dashboard { grid-template-columns: 1fr; }
      .cell-revenue, .cell-status { grid-column: span 1; }
      .cell-timeline { grid-row: span 1; }
      .big-number { font-size: 2.25rem; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="cell cell-revenue">
      <div class="label">Revenue This Quarter</div>
      <div class="big-number accent">$2.4M</div>
      <div class="body-text" style="margin-top: 0.5rem;">+18% from previous quarter</div>
    </div>
    <div class="cell cell-projects">
      <div class="label">Active Projects</div>
      <div class="big-number">12</div>
    </div>
    <div class="cell cell-timeline">
      <div class="label">Timeline</div>
      <div class="timeline-item">
        <div class="timeline-date">Mar 28</div>
        <div class="timeline-desc">API v2 deployment complete</div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">Apr 4</div>
        <div class="timeline-desc">Security audit begins</div>
      </div>
      <div class="timeline-item">
        <div class="timeline-date">Apr 15</div>
        <div class="timeline-desc">Q2 planning review</div>
      </div>
    </div>
    <div class="cell cell-team">
      <div class="label">Team Size</div>
      <div class="big-number">34</div>
    </div>
    <div class="cell cell-completion">
      <div class="label">Completion Rate</div>
      <div class="big-number accent">87%</div>
    </div>
    <div class="cell cell-status">
      <div class="label">Status Overview</div>
      <div class="status-row">
        <span><span class="status-dot green"></span>Infrastructure: operational</span>
        <span><span class="status-dot yellow"></span>Pipeline: queued</span>
        <span><span class="status-dot blue"></span>Monitoring: provisioning</span>
      </div>
    </div>
  </div>
</body>
</html>
